name: self-test

on:
  push:
    branches:
    tags:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: set up go 1.22
        uses: actions/setup-go@v5
        id: go
        with:
          go-version: "1.22"
          cache-dependency-path: |
            go.sum

      - name: checkout
        uses: actions/checkout@v4

      - name: build and test
        run: |
          make test
        env:
          TZ: "Europe/Moscow"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
