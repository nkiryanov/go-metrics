name: autotests

on:
  pull_request:
    branches:
      - main
      - 'iter*'
  push:
    branches:
      - main

jobs:

  branchtest:
    runs-on: ubuntu-latest

    steps:
      - name: Check branch name
        run: |
          if [[ ! $GITHUB_HEAD_REF =~ ^iter[0-9]+.*$ ]] && [[ ${{ github.ref }} != "refs/heads/main" ]]; then
            echo "Branch name must match start with 'iter<number>' or be 'main'"
            echo "Detected branch: ${GITHUB_HEAD_REF}"
            exit 1
          fi
          echo "Branch OK: ${GITHUB_HEAD_REF}"

  metricstest:
    runs-on: ubuntu-latest
    container: golang:1.25
    needs: branchtest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: praktikum
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Extract ITER number
        id: extract_iter
        shell: bash
        run: |
          REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Processing branch: $REF"
          if [[ "$REF" =~ ^iter([0-9]+) ]]; then
            ITER_NUM="${BASH_REMATCH[1]}"
          else
            ITER_NUM=0
          fi
          echo "ITER_NUM=$ITER_NUM" >> $GITHUB_ENV
          echo "Resolved ITER_NUM=$ITER_NUM"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download autotests binaries
        uses: robinraju/release-downloader@v1.12
        with:
          repository: Yandex-Practicum/go-autotests
          latest: true
          fileName: "*"
          out-file-path: .tools
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup autotest binary
        run: |
          chmod -R +x $GITHUB_WORKSPACE/.tools
          mv $GITHUB_WORKSPACE/.tools/metricstest /usr/local/bin/metricstest
          mv $GITHUB_WORKSPACE/.tools/random /usr/local/bin/random

      - name: Setup go deps
        run: |
          go install golang.org/x/tools/cmd/goimports@latest


      - name: Build server binary
        run: |
          cd cmd/server
          go build -buildvcs=false -o server

      - name: "Code increment #1"
        if: |
          github.ref == 'refs/heads/main' ||
          (env.ITER_NUM != '0' && fromJSON(env.ITER_NUM) >= 1)
        run: |
          metricstest -test.v -test.run=^TestIteration1$ \
            -binary-path=cmd/server/server

      - name: Build agent binary
        run: |
          cd cmd/agent
          go build -buildvcs=false  -o agent

      - name: "Code increment #2"
        if: |
          github.ref == 'refs/heads/main' ||
          (env.ITER_NUM != '0' && fromJSON(env.ITER_NUM) >= 2)
        run: |
          metricstest -test.v -test.run=^TestIteration2[AB]*$ \
            -source-path=. \
            -agent-binary-path=cmd/agent/agent

      - name: "Code increment #3"
        if: |
          github.ref == 'refs/heads/main' ||
          (env.ITER_NUM != '0' && fromJSON(env.ITER_NUM) >= 3)
        run: |
          metricstest -test.v -test.run=^TestIteration3[AB]*$ \
            -source-path=. \
            -agent-binary-path=cmd/agent/agent \
            -binary-path=cmd/server/server

      - name: "Code increment #4"
        if: |
          github.ref == 'refs/heads/main' ||
          (env.ITER_NUM != '0' && fromJSON(env.ITER_NUM) >= 4)
        run: |
          SERVER_PORT=$(random unused-port)
          ADDRESS="localhost:${SERVER_PORT}"
          TEMP_FILE=$(random tempfile)
          metricstest -test.v -test.run=^TestIteration4$ \
            -agent-binary-path=cmd/agent/agent \
            -binary-path=cmd/server/server \
            -server-port=$SERVER_PORT \
            -source-path=.

      - name: "Code increment #5"
        if: |
          github.ref == 'refs/heads/main' ||
          (env.ITER_NUM != '0' && fromJSON(env.ITER_NUM) >= 5)
        run: |
          SERVER_PORT=$(random unused-port)
          ADDRESS="localhost:${SERVER_PORT}"
          TEMP_FILE=$(random tempfile)
          metricstest -test.v -test.run=^TestIteration5$ \
            -agent-binary-path=cmd/agent/agent \
            -binary-path=cmd/server/server \
            -server-port=$SERVER_PORT \
            -source-path=.

      - name: "Code increment #6"
        if: |
          github.ref == 'refs/heads/main' ||
